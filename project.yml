name: PromoKit
options:
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: dev.sinuk.promokit
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  PromoKit:
    type: application
    platform: iOS
    sources:
      - Sources/PromoKit
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint --config "$SRCROOT/.swiftlint.yml"
          elif [ -x /opt/homebrew/bin/swiftlint ]; then
            /opt/homebrew/bin/swiftlint --config "$SRCROOT/.swiftlint.yml"
          elif [ -x /usr/local/bin/swiftlint ]; then
            /usr/local/bin/swiftlint --config "$SRCROOT/.swiftlint.yml"
          else
            echo "warning: SwiftLint not installed. Install with: brew install swiftlint"
          fi
    postBuildScripts:
      - name: Copy Local Code CSVs
        basedOnDependencyAnalysis: false
        script: |
          if [ "$CONFIGURATION" = "Debug" ] && [ -d "$SRCROOT/LocalCodes" ]; then
            mkdir -p "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
            cp "$SRCROOT"/LocalCodes/products.json "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/products.json" 2>/dev/null || true
            cp "$SRCROOT"/LocalCodes/*.csv "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/" 2>/dev/null || true
          fi
    settings:
      base:
        INFOPLIST_FILE: Sources/PromoKit/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: PromoKit
        INFOPLIST_KEY_CFBundleName: "PromoKit: Offer Codes"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        PRODUCT_NAME: "PromoKit: Offer Codes"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/PromoKit/PromoKit.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        # iPhone only (1). 2 = iPad, "1,2" = universal. iPhone-only
        # avoids needing iPad screenshots for App Store submission.
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  PromoKit:
    build:
      targets:
        PromoKit: all
    run:
      config: Debug
    archive:
      config: Release
